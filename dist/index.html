<!DOCTYPE html><html lang="zh-TW"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Patent Analysis Agent</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/global.css"></head> <body> <div class="app">   <aside class="sidebar"> <div class="sidebar-brand"> <div class="logo">P</div> <div class="brand-text">
Patent Analysis
<small>Agent System</small> </div> </div> <nav class="sidebar-nav"> <a href="/" class="active"> <span class="icon">✨</span> <span data-key="nav_new">新增分析</span> </a> <a href="/status"> <span class="icon">📋</span> <span data-key="nav_status">任务状态</span> </a> <a href="/reports"> <span class="icon">📊</span> <span data-key="nav_reports">报告列表</span> </a> </nav> <div class="sidebar-footer"> <button class="lang-switch" onclick="toggleLang()"> <span id="langFlag">🇹🇼</span> <span id="langLabel">EN</span> </button> </div> </aside>  <main class="main"> <div class="page-header"> <h1 data-key="title_new">新增分析请求</h1> <p class="page-desc" data-key="desc_new">选择分析模式并填写技术信息，系统将自动搜索相关专利并生成深度分析报告。</p> </div> <div class="card"> <form id="analysisForm"> <!-- Analysis Mode --> <div class="form-section"> <label class="form-label" data-key="label_mode">分析模式</label> <select id="mode" name="mode" class="form-select mode-select" required> <option value="sota" data-key="mode_sota">技术全景 (SOTA)</option> <option value="patentability" data-key="mode_patentability">可专利性评估</option> <option value="fto" data-key="mode_fto">自由实施 (FTO)</option> <option value="structured" data-key="mode_structured">结构化分析</option> </select> </div> <div class="divider"></div> <!-- SOTA Fields --> <div id="sota-fields" class="field-section"> <div class="form-section"> <label class="form-label"> <span data-key="label_topic">技术主题</span> <span class="required">*</span> </label> <textarea name="topic" class="form-textarea xl" placeholder="" data-placeholder-key="placeholder_topic" required></textarea> </div> <div class="form-section"> <label class="form-label" data-key="label_keywords">附加关键词</label> <textarea name="keywords" class="form-textarea lg" placeholder="" data-placeholder-key="placeholder_keywords"></textarea> <p class="form-hint" data-key="hint_keywords">多个关键词请用空格分隔</p> </div> </div> <!-- Patentability Fields --> <div id="patentability-fields" class="field-section" style="display:none;"> <div class="form-section"> <label class="form-label"> <span data-key="label_invention">发明描述</span> <span class="required">*</span> </label> <textarea name="invention" class="form-textarea xl" placeholder="" data-placeholder-key="placeholder_invention" required></textarea> </div> <div class="form-section"> <label class="form-label" data-key="label_field">技术领域</label> <input type="text" name="field" class="form-input" placeholder="" data-placeholder-key="placeholder_field"> </div> </div> <!-- FTO Fields --> <div id="fto-fields" class="field-section" style="display:none;"> <div class="form-section"> <label class="form-label"> <span data-key="label_product">产品描述</span> <span class="required">*</span> </label> <textarea name="product" class="form-textarea xl" placeholder="" data-placeholder-key="placeholder_product" required></textarea> </div> <div class="form-row"> <div class="form-section"> <label class="form-label" data-key="label_markets">目标市场</label> <input type="text" name="markets" class="form-input" value="US, TW, EP" placeholder="" data-placeholder-key="placeholder_markets"> <p class="form-hint" data-key="hint_markets">市场代码用逗号分隔</p> </div> <div class="form-section"> <label class="form-label" data-key="label_assignees">目标公司</label> <input type="text" name="assignees" class="form-input" placeholder="" data-placeholder-key="placeholder_assignees"> </div> </div> </div> <!-- Structured Fields --> <div id="structured-fields" class="field-section" style="display:none;"> <div class="form-section"> <label class="form-label"> <span data-key="label_query">检索查询</span> <span class="required">*</span> </label> <input type="text" name="query" class="form-input" placeholder="" data-placeholder-key="placeholder_query" required> </div> <div class="form-section"> <label class="form-label" data-key="label_patent_ids">专利号码</label> <input type="text" name="patent_ids" class="form-input" placeholder="" data-placeholder-key="placeholder_patent_ids"> <p class="form-hint" data-key="hint_patent_ids">专利号码用逗号分隔</p> </div> <div class="form-section" style="max-width: 200px;"> <label class="form-label" data-key="label_max_structured">最大专利数</label> <input type="number" name="max_results_structured" class="form-input" value="10" min="1" max="50"> </div> </div> <div class="divider"></div> <!-- Max Results (common) --> <div class="form-section" style="max-width: 200px;"> <label class="form-label" data-key="label_max_results">最大结果数</label> <input type="number" name="max_results" class="form-input" value="50" min="10" max="200"> </div> <button type="submit" class="btn btn-block" id="submitBtn" data-key="btn_submit">
提交分析请求
</button> <div id="result"></div> </form> </div> </main> <script>
    const DICT = {
      zh: {
        nav_new: "新增分析", nav_status: "任务状态", nav_reports: "报告列表",
        title_new: "新增分析请求",
        desc_new: "选择分析模式并填写技术信息，系统将自动搜索相关专利并生成深度分析报告。",
        label_mode: "分析模式", label_topic: "技术主题", label_keywords: "附加关键词",
        label_invention: "发明描述", label_field: "技术领域",
        label_product: "产品描述", label_markets: "目标市场", label_assignees: "目标公司",
        label_query: "检索查询", label_patent_ids: "专利号码",
        label_max_results: "最大结果数", label_max_structured: "最大专利数",
        placeholder_topic: "输入技术主题，例如：negative pressure therapy",
        placeholder_keywords: "例如：oral device mask-free nasal",
        placeholder_invention: "详细描述您的发明，包括解决的问题、技术方案和预期效果...",
        placeholder_field: "例如：medical device, sleep therapy",
        placeholder_product: "描述您的产品特征、功能和应用场景...",
        placeholder_markets: "US, TW, EP, CN, JP",
        placeholder_assignees: "例如：Somnics, ResMed, Philips",
        placeholder_query: "例如：negative pressure therapy sleep apnea",
        placeholder_patent_ids: "WO2019123456, US10/123,456",
        hint_keywords: "多个关键词请用空格分隔",
        hint_markets: "市场代码用逗号分隔，例如：US, TW, EP",
        hint_patent_ids: "专利号码用逗号分隔",
        btn_submit: "提交分析请求",
        mode_sota: "技术全景 (SOTA)", mode_patentability: "可专利性评估", mode_fto: "自由实施 (FTO)", mode_structured: "结构化分析",
        subtitle_sota: "探索特定领域的技术全景与专利布局",
        subtitle_patentability: "评估发明的新颖性、创造性和可专利性",
        subtitle_fto: "分析产品是否侵犯现有专利权",
        subtitle_structured: "对单个专利进行深度结构化分析",
      },
      en: {
        nav_new: "New Analysis", nav_status: "Task Status", nav_reports: "Reports",
        title_new: "New Analysis Request",
        desc_new: "Select analysis mode and enter technical information. The system will automatically search relevant patents and generate a comprehensive analysis report.",
        label_mode: "Analysis Mode", label_topic: "Technology Topic", label_keywords: "Additional Keywords",
        label_invention: "Invention Description", label_field: "Technical Field",
        label_product: "Product Description", label_markets: "Target Markets", label_assignees: "Target Companies",
        label_query: "Search Query", label_patent_ids: "Patent Numbers",
        label_max_results: "Max Results", label_max_structured: "Max Patents",
        placeholder_topic: "Enter technology topic, e.g. negative pressure therapy",
        placeholder_keywords: "e.g. oral device mask-free nasal",
        placeholder_invention: "Describe your invention in detail, including the problem solved, technical approach, and expected effects...",
        placeholder_field: "e.g. medical device, sleep therapy",
        placeholder_product: "Describe your product features, functions, and use cases...",
        placeholder_markets: "US, TW, EP, CN, JP",
        placeholder_assignees: "e.g. Somnics, ResMed, Philips",
        placeholder_query: "e.g. negative pressure therapy sleep apnea",
        placeholder_patent_ids: "WO2019123456, US10/123,456",
        hint_keywords: "Multiple keywords separated by spaces",
        hint_markets: "Market codes separated by commas, e.g. US, TW, EP",
        hint_patent_ids: "Patent numbers separated by commas",
        btn_submit: "Submit Analysis Request",
        mode_sota: "State of the Art (SOTA)", mode_patentability: "Patentability Assessment", mode_fto: "Freedom to Operate (FTO)", mode_structured: "Structured Analysis",
        subtitle_sota: "Explore the technology landscape and patent distribution in a specific field",
        subtitle_patentability: "Assess novelty, inventiveness, and patentability of an invention",
        subtitle_fto: "Analyze whether a product infringes existing patents",
        subtitle_structured: "Perform deep structured analysis on a single patent",
      }
    };

    let currentLang = localStorage.getItem('patent-lang') || 'zh';

    function applyLanguage() {
      const d = DICT[currentLang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (d[key]) el.textContent = d[key];
      });
      document.querySelectorAll('[data-placeholder-key]').forEach(el => {
        const key = el.getAttribute('data-placeholder-key');
        if (d[key]) el.placeholder = d[key];
      });

      const flag = document.getElementById('langFlag');
      const label = document.getElementById('langLabel');
      if (flag) flag.textContent = currentLang === 'zh' ? '🇹🇼' : '🇺🇸';
      if (label) label.textContent = currentLang === 'zh' ? 'EN' : '中文';

      document.documentElement.lang = currentLang === 'zh' ? 'zh-TW' : 'en';
    }

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('patent-lang', currentLang);
      applyLanguage();
    }

    // Mode switching
    const modeSelect = document.getElementById('mode');
    const sections = {
      sota: document.getElementById('sota-fields'),
      patentability: document.getElementById('patentability-fields'),
      fto: document.getElementById('fto-fields'),
      structured: document.getElementById('structured-fields')
    };

    function switchMode() {
      const mode = modeSelect.value;
      Object.values(sections).forEach(s => s.style.display = 'none');
      if (sections[mode]) sections[mode].style.display = 'block';
    }

    modeSelect.addEventListener('change', switchMode);

    // Submit
    document.getElementById('analysisForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = currentLang === 'zh' ? '提交中...' : 'Submitting...';

      const formData = new FormData(this);
      const data = Object.fromEntries(formData.entries());
      data.mode = modeSelect.value;

      try {
        const res = await fetch('/api/create-task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const json = await res.json();
        if (json.success) {
          result.innerHTML = `<div class="result-msg success">✓ ${currentLang === 'zh' ? '分析请求已提交' : 'Analysis request submitted'} — <a href="${json.issue_url}" target="_blank" style="color:inherit;text-decoration:underline;">Issue #${json.issue_number}</a></div>`;
          this.reset();
          switchMode();
        } else {
          result.innerHTML = `<div class="result-msg error">✗ ${json.error || (currentLang === 'zh' ? '提交失败' : 'Submission failed')}</div>`;
        }
      } catch (err) {
        result.innerHTML = `<div class="result-msg error">✗ ${currentLang === 'zh' ? '网络错误' : 'Network error'}: ${err.message}</div>`;
      }
      btn.disabled = false;
      applyLanguage();
    });

    applyLanguage();
    switchMode();
  </script>  </div> </body></html>
