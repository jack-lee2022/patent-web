<!DOCTYPE html><html lang="zh-TW"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reports - Patent Analysis Agent</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/global.css"></head> <body> <div class="app">   <aside class="sidebar"> <div class="sidebar-brand"> <div class="logo">P</div> <div class="brand-text">Patent Analysis<small>Agent System</small></div> </div> <nav class="sidebar-nav"> <a href="/"><span class="icon">✨</span><span data-key="nav_new">新增分析</span></a> <a href="/status"><span class="icon">📋</span><span data-key="nav_status">任务状态</span></a> <a href="/reports" class="active"><span class="icon">📊</span><span data-key="nav_reports">报告列表</span></a> </nav> <div class="sidebar-footer"> <button class="lang-switch" onclick="toggleLang()"><span id="langFlag">🇹🇼</span><span id="langLabel">EN</span></button> </div> </aside>  <main class="main"> <div class="page-header"> <h1 data-key="title_reports">分析报告</h1> </div> <div class="card"> <div id="loading" style="color:var(--text-muted);padding:1rem 0;">加载中...</div> <div id="reports"></div> </div> </main> <script>
    const DICT = {
      zh: {
        nav_new: "新增分析", nav_status: "任务状态", nav_reports: "报告列表",
        title_reports: "分析报告", loading: "加载中...", empty: "暂无报告", error: "加载失败",
        table_name: "报告名称", table_size: "大小", table_date: "日期", table_view: "查看",
      },
      en: {
        nav_new: "New Analysis", nav_status: "Task Status", nav_reports: "Reports",
        title_reports: "Analysis Reports", loading: "Loading...", empty: "No reports yet", error: "Failed to load",
        table_name: "Name", table_size: "Size", table_date: "Date", table_view: "View",
      }
    };

    let currentLang = localStorage.getItem('patent-lang') || 'zh';

    function applyLanguage() {
      const d = DICT[currentLang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (d[key]) el.textContent = d[key];
      });
      const lf = document.getElementById('langFlag'), ll = document.getElementById('langLabel');
      if (lf) lf.textContent = currentLang === 'zh' ? '🇹🇼' : '🇺🇸';
      if (ll) ll.textContent = currentLang === 'zh' ? 'EN' : '中文';
    }

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('patent-lang', currentLang);
      applyLanguage();
      loadReports();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function extractDate(name) {
      const m = name.match(/(\d{8})/);
      if (!m) return '';
      const y = m[1].slice(0,4), mo = m[1].slice(4,6), d = m[1].slice(6,8);
      return `${y}-${mo}-${d}`;
    }

    async function loadReports() {
      const container = document.getElementById('reports');
      const loading = document.getElementById('loading');
      const d = DICT[currentLang];
      if (loading) loading.style.display = 'block';
      container.innerHTML = '';

      try {
        const resp = await fetch('/api/list-reports');
        const reports = await resp.json();
        if (loading) loading.style.display = 'none';

        if (reports.error) {
          container.innerHTML = `<div class="result-msg error">${d.error}: ${reports.error}</div>`;
          return;
        }
        if (!reports.length) {
          container.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:2rem 0;">${d.empty}</p>`;
          return;
        }

        const rows = reports.map(r => {
          const date = extractDate(r.name);
          return `<tr>
            <td style="font-weight:500;color:var(--text);word-break:break-all;">${r.name}</td>
            <td style="color:var(--text-muted);font-size:0.85rem;white-space:nowrap;">${formatSize(r.size)}</td>
            <td style="color:var(--text-muted);font-size:0.85rem;white-space:nowrap;">${date}</td>
            <td><a href="${r.download_url || r.url}" target="_blank" style="color:var(--accent);font-size:0.85rem;text-decoration:none;">View →</a></td>
          </tr>`;
        }).join('');

        container.innerHTML = `
          <div style="overflow-x:auto;">
            <table class="data-table">
              <thead><tr>
                <th>${d.table_name}</th>
                <th style="width:80px">${d.table_size}</th>
                <th style="width:100px">${d.table_date}</th>
                <th style="width:80px">${d.table_view}</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } catch (err) {
        if (loading) loading.style.display = 'none';
        container.innerHTML = `<div class="result-msg error">${d.error}: ${err.message}</div>`;
      }
    }

    applyLanguage();
    loadReports();
  </script>  </div> </body></html>
