<!DOCTYPE html><html lang="zh-TW"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Reports - Patent Analysis Agent</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="/styles/global.css"></head> <body> <div class="app">  <div class="centered-page"> <!-- Top Language Toggle --> <div class="top-bar"> <button class="lang-toggle" onclick="toggleLang()"> <span id="langLabel">EN</span> | <span id="langAlt">中文</span> </button> </div> <!-- Logo & Title --> <div class="hero"> <div class="hero-logo"> <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"> <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2" opacity="0.3"></circle> <path d="M24 8C24 8 32 16 32 24C32 32 24 40 24 40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"></path> <path d="M24 12C24 12 28 18 28 24C28 30 24 36 24 36" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.6"></path> <path d="M24 16C24 16 26 20 26 24C26 28 24 32 24 32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"></path> </svg> </div> <h1 class="hero-title">PATENT ANALYSIS AGENT</h1> </div> <!-- Navigation --> <nav class="top-nav"> <a href="/" data-key="nav_new">New Analysis</a> <a href="/status" data-key="nav_status">Task Status</a> <a href="/reports" class="active" data-key="nav_reports">Reports</a> </nav> <!-- Content Card --> <div class="form-card"> <h2 class="form-title" data-key="title_reports">Analysis Reports</h2> <p class="form-subtitle" data-key="subtitle">Generated Reports</p> <div id="loading" style="color:var(--text-muted);padding:1rem 0;">Loading...</div> <div id="reports"></div> </div> </div> <div class="sparkle" aria-hidden="true">✦</div> <script>(function(){const DICT = {"zh":{"nav_new":"New Analysis","nav_status":"Task Status","nav_reports":"Reports","title_reports":"Analysis Reports","subtitle":"Generated Reports"},"en":{"nav_new":"New Analysis","nav_status":"Task Status","nav_reports":"Reports","title_reports":"Analysis Reports","subtitle":"Generated Reports"}};

    let currentLang = localStorage.getItem('patent-lang') || 'zh';

    function applyLanguage() {
      const d = DICT[currentLang];
      document.querySelectorAll('[data-key]').forEach(el => {
        const key = el.getAttribute('data-key');
        if (d[key]) el.textContent = d[key];
      });

      const label = document.getElementById('langLabel');
      const alt = document.getElementById('langAlt');
      if (label) label.textContent = currentLang === 'zh' ? 'EN' : '中文';
      if (alt) alt.textContent = currentLang === 'zh' ? '中文' : 'EN';

      document.documentElement.lang = currentLang === 'zh' ? 'zh-TW' : 'en';
    }

    function toggleLang() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('patent-lang', currentLang);
      applyLanguage();
      loadReports();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function extractDate(name) {
      const m = name.match(/(\d{8})/);
      if (!m) return '';
      const y = m[1].slice(0,4), mo = m[1].slice(4,6), d = m[1].slice(6,8);
      return y + '-' + mo + '-' + d;
    }

    async function loadReports() {
      const container = document.getElementById('reports');
      const loading = document.getElementById('loading');
      const d = DICT[currentLang];
      if (loading) loading.style.display = 'block';
      container.innerHTML = '';

      try {
        const resp = await fetch('/api/list-reports');
        const reports = await resp.json();
        if (loading) loading.style.display = 'none';

        if (reports.error) {
          container.innerHTML = '<div class="result error">' + (d.error || 'Error') + ': ' + reports.error + '</div>';
          return;
        }
        if (!reports.length) {
          container.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem 0;">' + (d.empty || 'No reports') + '</p>';
          return;
        }

        const rows = reports.map(r => {
          const date = extractDate(r.name);
          return '<tr>' +
            '<td style="font-weight:500;color:var(--text);word-break:break-all;">' + r.name + '</td>' +
            '<td style="color:var(--text-muted);font-size:0.85rem;white-space:nowrap;">' + formatSize(r.size) + '</td>' +
            '<td style="color:var(--text-muted);font-size:0.85rem;white-space:nowrap;">' + date + '</td>' +
            '<td><a href="' + (r.download_url || r.url) + '" target="_blank" style="color:var(--accent);font-size:0.85rem;text-decoration:none;">View →</a></td>' +
          '</tr>';
        }).join('');

        container.innerHTML = '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>' +
          '<th>' + (d.table_name || 'Name') + '</th>' +
          '<th style="width:80px">' + (d.table_size || 'Size') + '</th>' +
          '<th style="width:100px">' + (d.table_date || 'Date') + '</th>' +
          '<th style="width:80px">' + (d.table_view || 'View') + '</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table></div>';
      } catch (err) {
        if (loading) loading.style.display = 'none';
        container.innerHTML = '<div class="result error">' + (d.error || 'Error') + ': ' + err.message + '</div>';
      }
    }

    applyLanguage();
    loadReports();
  })();</script>  </div> </body></html>
